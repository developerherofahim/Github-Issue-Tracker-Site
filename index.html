<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Log In</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <section class="w-2/3 md:w-1/3 bg-gray-100 shadow-sm min-h-screen mx-auto my-30">
        <div class="flex flex-col justify-center items-center gap-8 pt-20">
            <img src="./assets/github-logo.png" alt="">
            <div class="space-y-2">
                <h3 class="text-2xl md:text-3xl font-bold text-center">GitHub Issues Tracker</h3>
                <p class="text-md md:text-xl font-medium text-center text-gray-500">Sign in to manage your issues</p>
            </div>
        </div>
        <fieldset class="fieldset border-base-300 rounded-box w-xs border p-4 mx-auto">

            <label class="label">Username</label>
            <input id="login_username" type="text" class="input" placeholder="Enter Username" />

            <label class="label">Password</label>
            <input id="login_password" type="password" class="input" placeholder="Password" />

            <button id="login_btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </section>

    <script src="./scripts/login.js"></script>
</body>
</html>
