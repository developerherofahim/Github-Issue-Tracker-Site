<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Log In</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles/style.css">
</head>

<body class="bg-gray-100">

  <section class="min-h-screen flex items-center justify-center px-4">
    
    <div class="w-full max-w-md bg-white shadow-md rounded-xl p-6">

      <div class="flex flex-col justify-center items-center gap-6 mb-6">
        <img src="./assets/github-logo.png" class="w-16" alt="">
        
        <div class="space-y-2">
          <h3 class="text-xl md:text-2xl font-bold text-center">
            GitHub Issues Tracker
          </h3>
          <p class="text-sm md:text-base text-center text-gray-500">
            Sign in to manage your issues
          </p>
        </div>
      </div>

      <fieldset class="w-full rounded-lg p-4">
        
        <label class="label">Username</label>
        <input id="login_username" type="text" class="input w-full" placeholder="Enter Username" />

        <label class="label mt-4">Password</label>
        <input id="login_password" type="password" class="input w-full" placeholder="Password" />

        <button id="login_btn" class="btn btn-primary w-full mt-6">
          Sign In
        </button>

      </fieldset>

  </section>
    <script src="./scripts/login.js"></script>
</body>
</html>
