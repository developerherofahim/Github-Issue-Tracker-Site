<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker || Dashboard</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="py-10 flex flex-col px-5 gap-4 md:flex-row md:justify-between md:items-center md:px-15">
        <div class="flex gap-2 justify-center items-center">
            <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold">Github Issues Tracker</h2>
        </div>
        <div class="join flex gap-2 justify-center items-center">
            <div >
                <label class="input join-item rounded-sm">
                <svg class="w-7 h-7" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/></svg>
                <input id="input-search" class="rounded-sm" type="text" placeholder="Search Issues" required />
                </label>
            </div>
            <div>
                <button id="search-btn" class="btn btn-primary rounded-sm"> + New Issue</button>
            </div>
            
        </div>
    </header>
    <section id="tab-container" class="mb-10">
        
    </section>

    <section class="mb-10">
        <div id="count-container" class="mx-5 px-3 py-3 md:mx-15 md:px-5 md:py-5 bg-gray-50 rounded-sm flex justify-between">
            <div class="flex gap-4 items-center">
                <div class="flex items-center px-1 py-1 bg-violet-300 rounded-full w-10 h-10 overflow-hidden">
                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>
                    <h2 class="text-xl font-semibold"><span id="issue-length">50</span> Issues</h2>
                    <p class="text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="hidden sm:flex gap-5">
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-green-700"></div>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-violet-700"></div>
                    <p>Close</p>
                </div>
            </div>
        </div>
    </section>

    <div id="spinner" class="mx-5 px-3 py-3 md:mx-15 md:px-5 md:py-5 rounded-sm flex justify-center">
        <span class="loading loading-spinner loading-xl"></span>
    </div>

    <section id="issue-container" class="grid grid-cols-1 gap-4 card mx-5 px-3 py-3 sm:grid-cols-2 lg:grid-cols-4 bg-gray-50 lg:mx-15 lg:px-5 lg:py-5 lg:mb-5">
       
    </section>

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    
    
  </div>
</dialog>


    <script src="./scripts/script.js"></script>
</body>
</html>
